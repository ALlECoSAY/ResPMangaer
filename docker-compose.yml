services:
  bot:
    build: .
    container_name: telegram-ai-thread-bot
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config:/app/config
    restart: unless-stopped
    command: ["sh", "-c", "alembic upgrade head && python -m app.main"]
    networks:
      - bot_net

  telegram-auth:
    build: .
    profiles: ["tools"]
    env_file:
      - .env
    volumes:
      - ./config:/app/config
    command: ["python", "-m", "app.tools.create_telegram_session"]
    stdin_open: true
    tty: true
    restart: "no"
    networks:
      - bot_net

  postgres:
    image: postgres:16-alpine
    container_name: telegram-ai-thread-bot-postgres
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - bot_net

volumes:
  postgres_data:

networks:
  bot_net:
    driver: bridge
